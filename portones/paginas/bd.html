<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    <title>Gestión de Base de Datos — Sistema de Acceso</title>
    <style>
        .tabla-scroll { overflow-x: auto; }
        #tablaDatos th { background-color: #343a40; color: #fff; white-space: nowrap; }
        #tablaDatos td { vertical-align: middle; white-space: nowrap; }
        .nav-tabs .nav-link { font-size: 0.85rem; padding: 0.4rem 0.75rem; }
        #spinnerCarga { text-align: center; padding: 3rem 0; }
        .badge { font-size: 0.78rem; }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <!-- ── Encabezado ─────────────────────────────────────────── -->
    <div class="container-fluid my-3">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-2">
                    <img src="../imagenes/imagen_2_para_mod.png" alt="Logo" height="30">
                    <h4 class="mb-0">🗄️ Gestión de Base de Datos</h4>
                </div>
                <a href="admi.html" class="btn btn-sm btn-outline-light">← Panel Admin</a>
            </div>

            <div class="card-body pb-0">
                <!-- Tabs de tablas -->
                <ul class="nav nav-tabs" id="navTabs" role="tablist"></ul>
            </div>

            <div class="card-body pt-2">

                <!-- Barra de herramientas -->
                <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
                    <div class="d-flex align-items-center gap-2">
                        <h5 class="mb-0" id="tituloTabla">—</h5>
                        <span class="badge bg-secondary" id="contadorRegistros">0 registros</span>
                    </div>
                    <div class="d-flex gap-2">
                        <input type="text" id="inputBusqueda"
                               class="form-control form-control-sm"
                               placeholder="🔍 Buscar en tabla..."
                               style="width: 220px;">
                        <button class="btn btn-sm btn-primary" id="btnNuevoRegistro">
                            ➕ Nuevo Registro
                        </button>
                        <button class="btn btn-sm btn-outline-secondary"
                                onclick="cargarTabla(tablaActual)">
                            🔄 Recargar
                        </button>
                    </div>
                </div>

                <!-- Alerta de error -->
                <div id="alertaError" class="alert alert-danger py-2" style="display:none;"></div>

                <!-- Spinner de carga -->
                <div id="spinnerCarga">
                    <div class="spinner-border text-dark" role="status"></div>
                    <p class="text-muted mt-2">Cargando datos...</p>
                </div>

                <!-- Tabla de datos -->
                <div id="contenedorTabla" class="tabla-scroll" style="display:none;">
                    <table class="table table-bordered table-hover table-sm" id="tablaDatos">
                        <thead id="tablaThead"></thead>
                        <tbody id="tablaTbody"></tbody>
                    </table>
                </div>

            </div><!-- /card-body -->
        </div><!-- /card -->
    </div><!-- /container -->


    <!-- ── Modal Crear / Editar ───────────────────────────────── -->
    <div class="modal fade" id="modalCrud" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title" id="modalTitulo">Registro</h5>
                    <button type="button" class="btn-close btn-close-white"
                            data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <form id="modalFormulario" novalidate></form>
                    <div id="mensajeModal" class="alert py-2 mt-2" style="display:none;"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary"
                            data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary"
                            id="btnGuardarModal">Guardar</button>
                </div>
            </div>
        </div>
    </div>


    <!-- ── Toast de notificación ──────────────────────────────── -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999;">
        <div id="toastNotif" class="toast align-items-center text-white bg-success border-0"
             role="alert" data-bs-autohide="true" data-bs-delay="3000">
            <div class="d-flex">
                <div class="toast-body" id="toastBody"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast" aria-label="Cerrar"></button>
            </div>
        </div>
    </div>



    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container d-flex justify-content-between align-items-center">
            <span>© 2026 ITLA - Sistema de Acceso Escolar Institucional - ITI</span>
            <img src="../imagenes/imagen_2_para_mod.png" alt="ITLA Logo" height="30">
        </div>
    </footer>



    <!-- ── Scripts ────────────────────────────────────────────── -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- api.js primero (define enviarDatos) -->
    <script src="../js/api.js"></script>
    <script src="../js/bd.js"></script>

</body>
</html>
