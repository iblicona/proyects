<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Consulta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="css/smcss.css" rel="stylesheet">
    <script src = "js/script.js" defer></script>
</head>
<body>
    <div class = "cons-container-fluid">
        <span>Consulta</span>
        <a href="opciones.html">Volver al menú</a>
    </div>
    <div class="cons-container">
        <form method="post">
            <div class="cons-row">
                <div class="cons-column">
                    <label for="matricula">idDocente:</label>
                    <input type="number" id="matricula" name="matricula" required>
    
                    <label for="name">Nombre del docente:</label>
                    <input type="text" id="name" name="name" required>
    
                    <label for="genero">Género:</label>
                    <select id="genero" name="genero" required>
                        <option value="">Selecciona un género</option>
                        <option value="masculino">Masculino</option>
                        <option value="femenino">Femenino</option>
                        <option value="otro">Otro</option>
                    </select>
                    <label for="sintomas">Síntomas y Observaciones:</label>
                    <textarea id="sintomas" name="sintomas" required></textarea>
                </div>
                <div class="cons-column">
                    <label for="appointment-date">Fecha de cita:</label>
                    <input type="date" id="appointment-date" name="appointment-date" required>
    
                    <label for="presion">Presión:</label>
                    <input type="number" id="presion" name="presion" placeholder="mmHg" required>
                    <label for="temperatura">Temperatura:</label>
                    <input type="number" id="temperatura" name="temperatura" placeholder="Cº" required>
    
                    <label for="medidosis">Medicamentos y dosis:</label>
                    <textarea id="medidosis" name="medidosis" required></textarea>
                </div>
            </div>
            <div class="button-row">
                <button type="submit">Enviar consulta</button>
                <button type ="reset">Reestablecer</button>
            </div>
        </form>
    </div>
</body>
</html>
