<!DOCTYPE html>
<html>
<head>
  <title>Registro de Médico ITLA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link href="css/smcss.css" rel="stylesheet">
</head>
<body>
    <div class = "register-container-fluid">
        <span>Registro de alumnos de ITLA</span>
        <a href="historial_clinico.html">Volver a Historial</a>
    </div>
    <div class = "login-container">
        <form action="registro_alumno.php" method="post">
            <label for="nombre">Nombre(s):</label>
            <input type="text" id="nombre" name="nombre" required><br><br>
            
            <label for="apellido_paterno">Apellido Paterno:</label>
            <input type="text" id="apellido_paterno" name="apellido_paterno" required><br><br>
            
            <label for="apellido_materno">Apellido Materno:</label>
            <input type="text" id="apellido_materno" name="apellido_materno" required><br><br>

            <label for = "matricula">Matrícula:</label>
            <input type="number" id="matricula" name="matricula" required><br><br>
            
            <label for="genero">Género:</label>
            <select id="genero" name="genero" required>
            <option value="">Selecciona un género</option>
            <option value="masculino">Masculino</option>
            <option value="femenino">Femenino</option>
            <option value="otro">Otro</option>
            </select><br><br>

            <label for="correo">Correo institucional:</label>
            <input type="email" id="correo" name="correo" placeholder="example@itla.mx" required><br><br>

            <label for="celular">Teléfono celular:</label>
            <input type="tel" id="celular" name="celular" required><br><br>

            <label for = "escolaridad">Escolaridad/Carrera:</label>
            <input type="text" id="escolaridad" name="escolaridad" required><br><br>

            <label for="birth">Fecha de nacimiento:</label>
            <input type="date" id="birth" name="birth" required><br><br>

            <label for="address">Dirección:</label>
            <input type="text" id="address" name="address" required><br><br>

            <label for="emergency_contact">Contacto de emergencia:</label>
            <input type="tel" id="emergency_contact" name="emergency_contact" required><br><br>

            <label for ="alergies">Alergias:</label>
            <textarea id="alergies" name="alergies" placeholder="Si no existe, favor de poner: NINGUNA" required></textarea><br><br>

            <label for="chronic_diseases">Enfermedades crónicas/Tratamientos:</label>
            <textarea id="chronic_diseases" name="chronic_diseases" placeholder="Si no existe, favor de poner: NINGUNA" required></textarea><br><br>
            
            <button type="submit">Registrar</button>
        </form>
    </div>
</body>
</html>
