<!DOCTYPE html>
<head>
  <title>Servicio Médico ITLA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link href="css/smcss.css" rel="stylesheet">
  <script src="js/inicio_sesion.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <div class="container-fluid">
      <span>Sistema Médico ITLA</span>
      <a href="registro_medico.html" target="_blank">Regístrate</a>
    </div>
    <div class="image-container">
        <img src="img/logo_itla.png" alt="Logo de ITLA">
    </div>
        <div class="login-container">
            <h2 align = "center">Bienvenido(a)</h2>
            <form action="php/login.php" method="post">
            <label for="username">Nombre de usuario:</label>
            <input type="text" id="username" name="usuario" placeholder="Ingresa tu nombre de usuario" required>
            
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
            
            
            <div class = "forgot-password">
                <a href="recuperar_contraseña.html">¿Olvidaste tu contraseña?</a>
            </div>
            </form>
            <button type="submit">Iniciar Sesión</button>
        </div>
</body>
</html>
