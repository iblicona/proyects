<!DOCTYPE html>
<html>
<head>
  <title>Registro de Médico ITLA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link href="css/smcss.css" rel="stylesheet">
</head>
<body>
    <div class = "register-container-fluid">
        <span>Registro de Médicos de ITLA</span>
        <a href="index.html">Volver</a>
    </div>
    <div class = "login-container">
        <!--Todos los php están de adorno hasta que sepa qué hacer con ellos-->
        <form action="registroM.php" method="post">
            <label for="nombre">Nombre(s):</label>
            <input type="text" id="nombre" name="nombre" required><br><br>
            
            <label for="apellido_paterno">Apellido Paterno:</label>
            <input type="text" id="apellido_paterno" name="apellido_paterno" required><br><br>
            
            <label for="apellido_materno">Apellido Materno:</label>
            <input type="text" id="apellido_materno" name="apellido_materno" required><br><br>
            
            <label for="genero">Género:</label>
            <select id="genero" name="genero" required>
            <option value="">Selecciona un género</option>
            <option value="masculino">Masculino</option>
            <option value="femenino">Femenino</option>
            <option value="otro">Otro</option>
            </select><br><br>

            <label for="correo">Correo:</label>
            <input type="email" id="correo" name="correo" required><br><br>

            <label for="celular">Teléfono celular:</label>
            <input type="tel" id="celular" name="celular" required><br><br>

            <label for="cedula_profesional">Cédula Profesional:</label>
            <input type="text" id="cedula_profesional" name="cedula_profesional" required><br><br>
            
            <label for="institucion_egreso">Institución de Egreso:</label>
            <input type="text" id="institucion_egreso" name="institucion_egreso" required><br><br>
            
            <label for="especialidad">Especialidad:</label>
            <input type="text" id="especialidad" name="especialidad" required><br><br>
               <label>Usuario:</label>
                <input type="text" name="usuario" required>

                <label>Contraseña:</label>
                <input type="password" name="password" required>
            <button type="submit" name="enviar2" id="enviar2">Registrar</button>
        </form>
    </div>
</body>
</html>
