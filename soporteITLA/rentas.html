<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Registro de Renta - ITLA</title>

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<header>
<img src="img/logoitla.png" class="logo" alt="Logo ITLA">
</header>

<div class="barra-sesion">
<span>Usuario: <b id="usuarioActivo"></b></span>
<button onclick="cerrarSesion()">Cerrar sesión</button>
</div>

<div class="titulo-header">
<h1>Área de Soporte Técnico - Registro de Renta</h1>
</div>

<div class="container">

<h2>Registrar Renta</h2>

<form id="formRenta">

<label>Nombre Completo</label>
<input type="text" id="nombre" required>

<label>Tipo de Identificación</label>
<select id="idTipo">
<option>Credencial ITLA</option>
<option>INE</option>
<option>Licencia</option>
<option>Otro</option>
</select>

<hr>

<h3>Agregar Equipos</h3>

<label>Seleccionar Equipo</label>

<select id="equipoSelect">
<option>Laptop</option>
<option>Cañón</option>
<option>Bocinas</option>
<option>Cable HDMI</option>
<option>Cable Ethernet</option>
<option>Llaves</option>
<option>Extensión</option>
<option>Otro</option>
</select>

<div id="campoExtra"></div>

<button type="button" onclick="agregarEquipo()">
Agregar Equipo
</button>

<ul id="listaEquipos"></ul>

<hr>

<label>Aula donde se usará</label>
<input type="text" id="aula" placeholder="Ejemplo: A-203">

<label>Horas de duración</label>
<input type="number" id="horas" min="1" max="4">

<button type="button" onclick="registrarRenta()">
Registrar Renta
</button>

</form>

<br>

<a href="historial.html" target="_blank" rel="noopener noreferrer">
<button>Ver Historial de Rentas</button>
</a>

<a href="admin.html">
<button style="background:#0a2a5e; margin-top:10px;">⚙️ Panel de Administración</button>
</a>

</div>

<script src="js/seguridad.js"></script>
<script src="js/script.js"></script>
</body>
</html>
