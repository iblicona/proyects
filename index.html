<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Biblioteca ITLA</title>
  <link rel="stylesheet" href="css/estilo.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="contenedor">
  <div class="bienvenida">
    <h1>¡Bienvenido!</h1>
    <img src="img/logo2.png" alt="Logo ITLA" class="logo">
  </div>

  <div class="login-box">
    <h2>Iniciar Sesión</h2>

    <div id="alerta-login" class="alerta-error" style="display: none;"></div>

    <form method="POST" action="procesar_login.php">
      <label for="usuario">Usuario</label>
      <input type="text" id="usuario" name="usuario" placeholder="Usuario" required>

      <label for="contrasena">Contraseña
        <a href="#" class="olvide">¿Olvidaste la contraseña?</a>
      </label>
      <input type="password" id="contrasena" name="contrasena" placeholder="Contraseña" required>

      <div class="recordar">
        <input type="checkbox" id="recordar" name="recordar">
        <label for="recordar">Recordar contraseña</label>
      </div>

      <button type="submit">Iniciar</button>
    </form>
  </div>
</div>

<script>
  // Leer los errores de la URL y mostrarlos
  const params = new URLSearchParams(window.location.search);
  const error = params.get('error');
  const alerta = document.getElementById('alerta-login');

  if (error === 'vacio') {
    alerta.textContent = 'Completa todos los campos.';
    alerta.style.display = 'block';
  } else if (error === 'incorrecto') {
    alerta.textContent = 'Usuario o contraseña incorrectos.';
    alerta.style.display = 'block';
  }
</script>
</body>
</html>
