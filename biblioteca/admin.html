```html
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin - Biblioteca</title>
  <link rel="stylesheet" href="css/admin.css">
  <script defer src="js/admin.js"></script>
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <h2>ITLA Biblioteca</h2>
      <hr>
    </div>

    <div class="sidebar-content">
      <div class="admin-box">👤 ADMIN</div>

      <button class="menu-btn activo">👥 Usuarios</button>
      <button class="menu-btn">📚 Libros</button>

      <!-- 🔥 NUEVO BOTÓN -->
      <button class="menu-btn" onclick="irRegistro()">➕ Registrar usuario</button>

      <!-- 🔒 CERRAR SESIÓN -->
      <button class="menu-btn" onclick="cerrarSesion()">🚪 Cerrar sesión</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">

    <!-- Topbar -->
    <header class="topbar">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

      <div class="topbar-right">
        <input type="text"
               id="buscador"
               placeholder="Buscar por nombre, matrícula o correo..."
               class="buscador">
      </div>
    </header>

    <div class="linea-superior"></div>

    <h1 class="titulo">Listado de Usuarios</h1>

    <!-- 🔹 CONTADOR -->
    <div id="contadorMes" style="margin:10px 0; font-weight:bold;"></div>

    <div class="card">

      <div class="card-header">
        Usuarios registrados en biblioteca
      </div>

      <!-- FILTROS -->
      <div class="filtro">

        <button class="filtro-btn" onclick="mesAnterior()">◀ Mes</button>

        <span id="mesActual"
              style="margin: 0 10px; font-weight:bold; font-size:1.1em;">
        </span>

        <button class="filtro-btn" onclick="mesSiguiente()">Mes ▶</button>

        <button class="exportar-btn" onclick="exportarExcel()">
          📊 Exportar Excel
        </button>

      </div>

      <!-- TABLA -->
      <table id="tablaExcel">
        <thead>
          <tr>
            <th>Foto</th>
            <th>Nombre</th>
            <th>Matrícula</th>
            <th>Tipo</th>
            <th>Área</th>
            <th>Correo</th>
            <th>Teléfono</th>
            <th>Fecha</th>
            <th>Acciones</th>
          </tr>
        </thead>

        <tbody id="tablaUsuarios"></tbody>
      </table>

    </div>
  </div>

</div>

<script>
// 🔹 Sidebar
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("oculto");
}

// 🔹 Ir a registro
function irRegistro() {
  window.location.href = "registro.html";
}

// 🔹 Cerrar sesión
function cerrarSesion() {
  localStorage.removeItem("usuario");
  window.location.href = "login.html";
}

// 🔒 Protección básica
const user = JSON.parse(localStorage.getItem("usuario"));
if (!user) {
  window.location.href = "login.html";
}
</script>

</body>
</html>
```
