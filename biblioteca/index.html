<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Biblioteca - ITLA</title>
    <style>
        /* Tu CSS que me pasaste (el de fondo azul fuerte) */
        body{ font-family: Arial, Helvetica, sans-serif; background: linear-gradient(135deg,#0a2a5e,#1e4c9a); height:100vh; display:flex; justify-content:center; align-items:center; margin:0; }
        .container{ background:white; padding:40px; border-radius:12px; width:380px; text-align:center; box-shadow:0px 10px 25px rgba(0,0,0,0.3); }
        .logo{ width:200px; margin-bottom:20px; }
        h1{ font-size:20px; margin-bottom:25px; color:#0a2a5e; }
        label{ display:block; text-align:left; margin-top:10px; font-weight:bold; }
        input, select{ width:100%; padding:10px; margin-top:5px; border-radius:6px; border:1px solid #ccc; }
        button{ margin-top:20px; width:100%; padding:12px; border:none; border-radius:6px; background:#0a2a5e; color:white; font-size:16px; cursor:pointer; }
        button:hover{ background:#143d85; }
        .footer{ margin-top:15px; font-size:12px; color:#777; }
    </style>
</head>
<body>
    <div class="container">
        <img src="img/logoitla.png" class="logo">
        <h1>Sistema de Biblioteca</h1>
        <form id="loginForm">
            <label>Usuario (Correo)</label>
            <input type="text" id="usuario" required placeholder="ejemplo@correo.com">
            <label>Contraseña</label>
            <input type="password" id="password" required>
            <label>Tipo de usuario</label>
            <select id="tipoUsuario">
                <option value="user">Alumno / Lector</option>
                <option value="admin">Administrador</option>
            </select>
            <button type="submit">Iniciar Sesión</button>
        </form>
        <div class="footer">Instituto Tecnológico Latinoamericano</div>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
