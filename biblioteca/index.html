<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Biblioteca - ITLA</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #ffffff; /* Fondo Blanco */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: #333;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            border: 1px solid #e0e0e0; /* Un borde suave para que resalte */
            box-shadow: 0px 4px 20px rgba(0,0,0,0.05);
        }

        .logo {
            width: 180px;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 30px;
            color: #0a2a5e; /* Azul ITLA para el título */
            font-weight: 600;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 15px;
            font-weight: 600;
            font-size: 14px;
            color: #555;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            background-color: #fafafa;
            transition: border 0.3s;
        }

        input:focus {
            outline: none;
            border: 1px solid #0a2a5e;
            background-color: #fff;
        }

        button {
            margin-top: 30px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #0a2a5e;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #143d85;
            box-shadow: 0px 4px 10px rgba(10, 42, 94, 0.2);
        }

        .footer {
            margin-top: 25px;
            font-size: 11px;
            color: #999;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="img/logoitla.png" class="logo" alt="Logo ITLA">
        <h1>Control de Biblioteca</h1>
        
        <form id="loginForm">
            <label>Correo Institucional</label>
            <input type="email" id="usuario" required placeholder="admin@correo.com">
            
            <label>Contraseña</label>
            <input type="password" id="password" required placeholder="••••••••">
            
            <button type="submit">Acceder al Sistema</button>
        </form>

        <div class="footer">
            INSTITUTO TECNOLÓGICO LATINOAMERICANO
        </div>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
