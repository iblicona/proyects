<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Biblioteca - ITLA</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f4f8;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .card {
            background: #ffffff;
            padding: 45px 40px;
            border-radius: 16px;
            width: 360px;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.10);
        }

        .logo {
            width: 160px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 20px;
            margin-bottom: 28px;
            color: #0a2a5e;
            font-weight: 700;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 16px;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 13px;
            color: #555;
        }

        input {
            width: 100%;
            padding: 11px 14px;
            border-radius: 8px;
            border: 1px solid #ddd;
            background: #fafafa;
            font-size: 14px;
            transition: border 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #0a2a5e;
            background: #fff;
        }

        button[type="submit"] {
            margin-top: 28px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #0a2a5e;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.25s;
        }

        button[type="submit"]:hover:not(:disabled) {
            background: #143d85;
        }

        button[type="submit"]:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        #msg-error {
            margin-top: 14px;
            font-size: 13px;
            color: #c0392b;
            min-height: 18px;
        }

        .footer {
            margin-top: 28px;
            font-size: 11px;
            color: #aaa;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Si no tienes el logo, borra la etiqueta img -->
        <!-- <img src="img/logoitla.png" class="logo" alt="Logo ITLA"> -->

        <h1>📚 Control de Biblioteca</h1>

        <form id="loginForm">
            <label for="usuario">Correo Institucional</label>
            <input type="email" id="usuario" placeholder="admin@correo.com" required>

            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" required>

            <button type="submit" id="btnLogin">Acceder al Sistema</button>
        </form>

        <div id="msg-error"></div>

        <div class="footer">INSTITUTO TECNOLÓGICO LATINOAMERICANO</div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
